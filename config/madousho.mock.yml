# Mock configuration for CI/CD testing
# This file is used in GitHub Actions to provide a valid config for tests

api:
  host: "0.0.0.0"
  port: 8000
  token: "test-token-for-ci"

provider:
  example_provider:
    type: "openai-compatible"
    endpoint: "https://example.com/v1"
    api-key: "sk-test123"

default_model_group: "example_group"
model_groups:
  example_group:
    - "example_provider/gpt-5.2"
    - "example_provider/fallback1"
    - "example_provider/fallback2"

database:
  url: "sqlite:///./data/madousho.db"
  sqlite:
    wal_enabled: true
    synchronous: "NORMAL"
    cache_size: -64000
    temp_store: "MEMORY"
    mmap_size: 268435456
    journal_size_limit: 67108864
    busy_timeout: 30000
    foreign_keys: true
