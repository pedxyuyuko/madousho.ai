[build-system]
requires = ["setuptools>=45", "wheel", "setuptools_scm[toml]>=6.2"]
build-backend = "setuptools.build_meta"

[project]
name = "madousho-ai"
dynamic = ["version"]  # Version auto-generated by setuptools_scm from git tags
# version = "0.0.1.dev0"  # Managed by setuptools_scm

authors = [

    {name = "pedxyuyuko", email = "uuz@sakurauuz.moe"}

]

maintainers = [

    {name = "pedxyuyuko", email = "uuz@sakurauuz.moe"}

]

description = "Madousho.ai (魔导书) - Systematic AI Agent Framework. A programmatic control flow + AI execution steps framework for building controllable AI agents with fixed workflow structures, supporting flow control (sequence, parallel, conditional, loops), plugin system, context management, and artifact generation."

readme = {file = "README.md", content-type = "text/markdown"}

license = "MIT"

requires-python = ">=3.10"

classifiers = [

    "Development Status :: 3 - Alpha",

    "Intended Audience :: Developers",

    "Operating System :: OS Independent",

    "Programming Language :: Python :: 3",

    "Programming Language :: Python :: 3.14",

    "Topic :: Scientific/Engineering :: Artificial Intelligence",

    "Topic :: Software Development :: Libraries :: Python Modules",

]

dependencies = [
    "typer>=0.9.0,<1.0.0",
    "loguru>=0.7.0,<1.0.0",
    "pyyaml>=6.0,<7.0",
    "pydantic>=2.0,<3.0",
    "pydantic-settings>=2.0,<3.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0,<10.0",
    "pytest-cov>=4.0,<5.0",
    "pytest-asyncio>=1.0.0,<2.0.0",
]

[project.urls]

Homepage = "https://github.com/pedxyuyuko/madousho-ai"

Repository = "https://github.com/pedxyuyuko/madousho-ai.git"

Bug-Tracker = "https://github.com/pedxyuyuko/madousho-ai/issues"



[project.scripts]

madousho = "madousho.cli:app"


[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_functions = ["test_*"]
addopts = [
    "-v",
    "--strict-markers",
    "--strict-config"
]


[tool.setuptools_scm]
write_to = "src/madousho/_version.py"
# Only tagged commits can generate versions - forces proper release workflow
version_scheme = "guess-next-dev"
# Push to master uses dev version on TestPyPI, Release with tag goes to official PyPI
local_scheme = "no-local-version"  # PyPI rejects local versions (+HASH)
