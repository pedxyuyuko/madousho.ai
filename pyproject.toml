[build-system]
requires = ["setuptools>=45", "wheel", "setuptools_scm[toml]>=6.2"]
build-backend = "setuptools.build_meta"

[project]
name = "madousho-ai"
dynamic = ["version"]  # Version auto-generated by setuptools_scm from git tags
# version = "0.0.1.dev0"  # Managed by setuptools_scm

authors = [

    {name = "pedxyuyuko", email = "uuz@sakurauuz.moe"}

]

maintainers = [

    {name = "pedxyuyuko", email = "uuz@sakurauuz.moe"}

]

description = "Madousho.ai (魔导书) - Systematic AI Agent Framework."

readme = {file = "README.md", content-type = "text/markdown"}

license = "MIT"

requires-python = ">=3.10"

classifiers = [

    "Development Status :: 3 - Alpha",

    "Intended Audience :: Developers",

    "Operating System :: OS Independent",

    "Programming Language :: Python :: 3",

    "Programming Language :: Python :: 3.10",

    "Topic :: Scientific/Engineering :: Artificial Intelligence",

    "Topic :: Software Development :: Libraries :: Python Modules",

]

dependencies = [
    "typer>=0.9.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=4.1.0",
]

[project.urls]

Homepage = "https://github.com/pedxyuyuko/madousho-ai"

Repository = "https://github.com/pedxyuyuko/madousho-ai.git"

Bug-Tracker = "https://github.com/pedxyuyuko/madousho-ai/issues"



[project.scripts]

madousho = "madousho.cli:app"


[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_functions = ["test_*"]
addopts = [
    "-v",
    "--strict-markers",
    "--strict-config"
]


[tool.setuptools_scm]
write_to = "src/madousho/_version.py"
# Only tagged commits can generate versions - forces proper release workflow
version_scheme = "guess-next-dev"
# Push to master uses dev version on TestPyPI, Release with tag goes to official PyPI
local_scheme = "no-local-version"  # PyPI rejects local versions (+HASH)

[tool.coverage.run]
branch = true
source = ["src/madousho"]
omit = [
    "*/tmp/pytest-of-*/*",
    "*/.pytest_cache/*",
    "*/tests/*",
    "src/madousho/cli.py",
    "src/madousho/logger.py",
    "src/madousho/commands/*",
    "src/madousho/_version.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "@abstractmethod",
]
